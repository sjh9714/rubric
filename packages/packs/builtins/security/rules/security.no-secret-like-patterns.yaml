id: security.no-secret-like-patterns
title: Secret-like values should not be committed
description: PRs should not add tokens, API keys, or credentials.
severity: error

applies_to:
  paths:
    - "**/*"

checks:
  added_patterns:
    - "ghp_[A-Za-z0-9_]{20,}"
    - "github_pat_[A-Za-z0-9_]{20,}"
    - "sk-[A-Za-z0-9_-]{20,}"
    - "AKIA[0-9A-Z]{16}"
    - "(api[_-]?key|API[_-]?KEY|secret|SECRET|password|PASSWORD|token|TOKEN)\\s*=\\s*['\\\"][^'\\\"]{12,}['\\\"]"

message: |
  This PR appears to add a secret-like value.

suggestion: |
  Remove the secret from the repository, rotate it if it was real, and use environment variables or a secrets manager.

compile:
  targets:
    - agents
    - claude
    - copilot

evidence:
  source: manual
  confidence: 0.9
