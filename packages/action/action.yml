name: Rubric
description: Run Rubric team review rules and post a sticky pull request comment.

inputs:
  base:
    description: Git base ref to compare against.
    required: true
  head:
    description: Git head ref to compare.
    required: false
    default: HEAD
  cwd:
    description: Working directory for Rubric.
    required: false
    default: .
  github-token:
    description: GitHub token used to create or update the PR comment.
    required: false
  comment:
    description: Post or update a sticky PR comment.
    required: false
    default: "true"
  fail-on-blocking:
    description: Fail the action when Rubric reports blocking findings.
    required: false
    default: "true"
  cli-version:
    description: Version of @rubric-dev/cli to run.
    required: false
    default: "0.2.1"

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 20

    - name: Validate GitHub comment token
      shell: bash
      env:
        COMMENT_ENABLED: ${{ inputs.comment }}
        GITHUB_TOKEN_INPUT: ${{ inputs.github-token }}
      run: |
        if [ "$COMMENT_ENABLED" = "true" ] && [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ -z "$GITHUB_TOKEN_INPUT" ]; then
          echo "Rubric comment mode requires github-token on pull_request events."
          echo "Set the github-token input or set comment: false."
          exit 1
        fi

    - name: Run Rubric
      shell: bash
      env:
        RUBRIC_BASE: ${{ inputs.base }}
        RUBRIC_HEAD: ${{ inputs.head }}
        RUBRIC_CWD: ${{ inputs.cwd }}
        RUBRIC_CLI_VERSION: ${{ inputs.cli-version }}
      run: |
        mkdir -p "$RUNNER_TEMP/rubric"
        report_path="$RUNNER_TEMP/rubric/report.md"

        set +e
        npx --yes --package "@rubric-dev/cli@${RUBRIC_CLI_VERSION}" rubric check \
          --cwd "$RUBRIC_CWD" \
          --base "$RUBRIC_BASE" \
          --head "$RUBRIC_HEAD" \
          --format markdown > "$report_path"
        exit_code=$?
        set -e

        if [ "$exit_code" -ge 2 ]; then
          cat "$report_path" >&2 || true
          exit "$exit_code"
        fi

        cat "$report_path" >> "$GITHUB_STEP_SUMMARY"

        {
          echo "RUBRIC_EXIT_CODE=$exit_code"
          echo "RUBRIC_REPORT_PATH=$report_path"
        } >> "$GITHUB_ENV"

    - name: Post Rubric PR comment
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v8
      env:
        RUBRIC_REPORT_PATH: ${{ env.RUBRIC_REPORT_PATH }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require("fs");
          const marker = "<!-- rubric:preflight -->";
          const report = fs.readFileSync(process.env.RUBRIC_REPORT_PATH, "utf8").trimEnd();
          const body = `${marker}\n${report}\n`;
          const issue_number = context.payload.pull_request?.number;

          if (issue_number === undefined) {
            core.info("No pull request context found; skipping Rubric comment.");
            return;
          }

          const { owner, repo } = context.repo;
          const { data: comments } = await github.rest.issues.listComments({
            owner,
            repo,
            issue_number,
            per_page: 100
          });
          const existing = comments.find(
            (comment) => comment.user?.type === "Bot" && comment.body?.includes(marker)
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
          }

    - name: Fail on blocking Rubric findings
      shell: bash
      env:
        FAIL_ON_BLOCKING: ${{ inputs.fail-on-blocking }}
      run: |
        if [ "$RUBRIC_EXIT_CODE" = "1" ] && [ "$FAIL_ON_BLOCKING" = "true" ]; then
          echo "Rubric reported blocking findings."
          exit 1
        fi
